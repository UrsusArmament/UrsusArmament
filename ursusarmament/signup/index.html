<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URSUS ACCOUNT PORTAL</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0a0a08;
    color: #e8e4d9;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .box {
    width: min(420px, 92%);
    background: linear-gradient(180deg, #1a1a17, #111110);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 2.5rem;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .card {
    flex: 1;
    padding: 1rem;
    border: 1px solid rgba(255,255,255,0.1);
    background: #111110;
    cursor: pointer;
    position: relative;
    text-align: left;
  }

  .card.selected { border-color: #c8922a; }

  .radio {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid #8a8678;
    position: absolute;
    top: 10px;
    right: 10px;
  }

  .card.selected .radio {
    background: #c8922a;
    border-color: #c8922a;
  }

  .title {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: #c8922a;
    margin-bottom: 0.5rem;
  }

  .list {
    font-size: 0.75rem;
    color: #8a8678;
    line-height: 1.4;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.15em;
    font-size: 2rem;
    margin-bottom: 1rem;
  }

  input, select {
    width: 100%;
    padding: 0.8rem;
    margin-bottom: 1rem;
    background: #111110;
    border: 1px solid rgba(255,255,255,0.1);
    color: #e8e4d9;
  }

  .hidden { display:none; }

  .row {
    display:flex;
    gap:0.5rem;
  }

  .msg { margin-top:1rem; color:#8a8678; }
</style>
</head>

<body>

<div class="container">

<!-- ================= LIMITED ================= -->
<div class="box">
  <h1>LIMITED ACCESS</h1>

  <input type="email" id="l_email" placeholder="Email">
  <input type="password" id="l_password" placeholder="Password">
  <input type="text" id="l_name" placeholder="Full Name">

  <button id="limitedBtn">Create Limited Account</button>
  <div class="msg" id="l_msg"></div>
</div>

<!-- ================= FULL ================= -->
<div class="box">
  <h1>FULL ACCESS</h1>

  <select id="accountType">
    <option value="individual">Individual</option>
    <option value="business">Business</option>
  </select>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="text" id="fullName" placeholder="Full Name">

  <!-- ADDRESS -->
  <input type="text" id="address1" placeholder="Address Line 1">
  <input type="text" id="address2" placeholder="Address Line 2">

  <div class="row">
    <input type="text" id="city" placeholder="City">
    <input type="text" id="state" placeholder="State">
    <input type="text" id="zip" placeholder="ZIP">
  </div>

  <input type="text" id="companyRep" class="hidden" placeholder="Company Representative">

  <!-- ================= INDIVIDUAL ================= -->
  <div id="individualOptions" style="display:flex; gap:1rem; margin-bottom:1rem;">

    <div id="opt1" class="card selected">
      <div class="radio"></div>
      <div class="title">ONE OF THE FOLLOWING:</div>
      <div class="list">
        <div>Passport / PR Card / Citizenship / Birth Cert</div>
      </div>
    </div>

    <div id="opt2" class="card">
      <div class="radio"></div>
      <div class="title">TWO OF THE FOLLOWING:</div>
      <div class="list">
        <div>DL / Voter ID / Govt ID / SSN / Consular Report</div>
      </div>
    </div>

  </div>

  <!-- ================= BUSINESS ================= -->
  <!-- BUSINESS OPTIONS -->
<div id="businessOptions" class="hidden" style="margin-bottom:1rem; text-align:left;">

  <div class="card" style="cursor:default;">
    <div class="title">REQUIRED DOCUMENTS</div>

    <div class="list">
      <div>Option 1: Business License / Registration</div>
      <div>Option 2: Articles of Incorporation / Formation</div>
    </div>
  </div>

</div>

  <input type="file" id="file1">
  <input type="file" id="file2" class="hidden">

  <button id="fullBtn">Create Full Access Account</button>
  <div class="msg" id="msg"></div>
</div>

</div>

<script type="module">
/* ================= ELEMENTS ================= */

const accountType = document.getElementById("accountType");
const companyRep = document.getElementById("companyRep");

const fullNameInput = document.getElementById("fullName");

const file1 = document.getElementById("file1");
const file2 = document.getElementById("file2");

const opt1 = document.getElementById("opt1");
const opt2 = document.getElementById("opt2");

/* ================= FILE MODE ================= */

function updateFileUI(mode) {
  fileMode = mode;

  opt1.classList.toggle("selected", mode === "1");
  opt2.classList.toggle("selected", mode === "2");

  const isBusiness = accountType.value === "business";

  // BUSINESS: always 2 files, ignore mode completely
  if (isBusiness) {
    file1.classList.remove("hidden");
    file2.classList.remove("hidden");
    return;
  }

  // INDIVIDUAL: normal behavior
  file1.classList.remove("hidden");
  file2.classList.toggle("hidden", mode === "1");
}

opt1.onclick = ()=>updateFileUI("1");
opt2.onclick = ()=>updateFileUI("2");

updateFileUI("1");

/* ================= MODE SWITCH ================= */

accountType.addEventListener("change", () => {
  const isBusiness = accountType.value === "business";

  // NAME FIELD
  fullNameInput.placeholder = isBusiness ? "Business Name" : "Full Name";

  // BUSINESS ONLY FIELD
  companyRep.classList.toggle("hidden", !isBusiness);

  // TOGGLE UI SECTIONS
  document.getElementById("individualOptions").style.display =
    isBusiness ? "none" : "flex";

  document.getElementById("businessOptions").style.display =
    isBusiness ? "block" : "none";

  // RESET FILE INPUTS
  file1.value = "";
  file2.value = "";

  // RESET FILE UI STATE (IMPORTANT)
  updateFileUI("1");
});

</script>

</body>
</html>
