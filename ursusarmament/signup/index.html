<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URSUS CREATE ACCOUNT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0a0a08;
    color: #e8e4d9;
    font-family: 'Barlow', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .box {
    width: min(420px, 92%);
    background: linear-gradient(180deg, #1a1a17, #111110);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 2.5rem;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.15em;
    font-size: 2rem;
    margin-bottom: 1.5rem;
  }

  select, input {
    width: 100%;
    padding: 0.8rem;
    margin-bottom: 1rem;
    background: #111110;
    border: 1px solid rgba(255,255,255,0.1);
    color: #e8e4d9;
    outline: none;
    font-family: 'Barlow', sans-serif;
  }

  input:focus, select:focus {
    border-color: #c8922a;
  }

  button {
    width: 100%;
    padding: 0.85rem;
    border: 1px solid #c8922a;
    background: transparent;
    color: #c8922a;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.2s ease;
  }

  button:hover {
    background: rgba(200,146,42,0.08);
  }

  .msg {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: #8a8678;
  }

  .sub {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: #8a8678;
  }

  .sub a {
    color: #c8922a;
    text-decoration: none;
  }

  .hidden {
    display: none;
  }
</style>
</head>

<body>

<div class="box">
  <h1>CREATE ACCOUNT</h1>

  <!-- Account Type -->
  <select id="accountType">
    <option value="individual">Individual</option>
    <option value="business">Business</option>
  </select>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <input type="text" id="fullName" placeholder="Full Name">
  <input type="text" id="address" placeholder="Physical End-Use Address">

  <!-- Individual option -->
  <select id="indOption">
    <option value="1">Submit 1 file</option>
    <option value="2">Submit 2 files</option>
  </select>

  <!-- Business fields -->
  <input type="text" id="companyRep" class="hidden" placeholder="Company Representative Name">
  <p id="bizNote" class="hidden" style="font-size:0.8rem;color:#8a8678;">
    Business accounts require 2 file submissions
  </p>

  <!-- File uploads -->
  <input type="file" id="file1">
  <input type="file" id="file2" class="hidden">

  <button id="signupBtn">Create Account</button>

  <div class="msg" id="msg"></div>

  <div class="sub">
    Already have an account?
    <a href="/ursusarmament/login/">Login</a>
  </div>
</div>

<script type="module">
import { createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const accountType = document.getElementById("accountType");
const indOption = document.getElementById("indOption");
const file2 = document.getElementById("file2");
const companyRep = document.getElementById("companyRep");
const bizNote = document.getElementById("bizNote");

function isPOBox(address) {
  return /p\s*\.?\s*o\s*\.?\s*box/i.test(address);
}

// UI logic
accountType.addEventListener("change", () => {
  if (accountType.value === "business") {
    companyRep.classList.remove("hidden");
    bizNote.classList.remove("hidden");
    file2.classList.remove("hidden");
  } else {
    companyRep.classList.add("hidden");
    bizNote.classList.add("hidden");
  }
});

indOption.addEventListener("change", () => {
  file2.classList.toggle("hidden", indOption.value !== "2");
});

// Submit
document.getElementById("signupBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const fullName = document.getElementById("fullName").value;
  const address = document.getElementById("address").value;
  const msg = document.getElementById("msg");

  if (isPOBox(address)) {
    msg.innerText = "PO Boxes are not allowed.";
    return;
  }

  const type = accountType.value;

  try {
    const userCred = await createUserWithEmailAndPassword(
      window.firebaseAuth,
      email,
      password
    );

    await setDoc(doc(window.firebaseDB, "users", userCred.user.uid), {
      email,
      fullName,
      address,
      accountType: type,
      approved: false,
      createdAt: Date.now()
    });

    msg.innerText = "Account created. Await approval.";
  } catch (err) {
    msg.innerText = err.message;
  }
});
</script>

<script type="module" src="/ursusarmament/firebase.js"></script>

</body>
</html>
