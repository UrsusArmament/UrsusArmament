<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URSUS ACCOUNT PORTAL</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0a0a08;
    color: #e8e4d9;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .box {
    width: min(420px, 92%);
    background: linear-gradient(180deg, #1a1a17, #111110);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 2.5rem;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.15em;
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  p {
    font-size: 0.85rem;
    color: #8a8678;
    margin-bottom: 1.5rem;
  }

  input, select {
    width: 100%;
    padding: 0.8rem;
    margin-bottom: 1rem;
    background: #111110;
    border: 1px solid rgba(255,255,255,0.1);
    color: #e8e4d9;
    outline: none;
  }

  input:focus, select:focus {
    border-color: #c8922a;
  }

  button {
    width: 100%;
    padding: 0.85rem;
    border: 1px solid #c8922a;
    background: transparent;
    color: #c8922a;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.2s ease;
  }

  button:hover {
    background: rgba(200,146,42,0.08);
  }

  .msg {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: #8a8678;
  }

  .hidden {
    display: none;
  }
</style>
</head>

<body>

<div class="container">

  <!-- LIMITED ACCOUNT -->
  <div class="box">
    <h1>LIMITED ACCESS</h1>
    <p>No access to restricted products.</p>

    <input type="email" id="l_email" placeholder="Email">
    <input type="password" id="l_password" placeholder="Password">
    <input type="text" id="l_name" placeholder="Full Name">

    <button id="limitedBtn">Create Limited Account</button>

    <div class="msg" id="l_msg"></div>
  </div>

  <!-- FULL ACCESS ACCOUNT -->
  <div class="box">
    <h1>FULL ACCESS</h1>
    <p>Requires review & approval.</p>

    <select id="accountType">
      <option value="individual">Individual</option>
      <option value="business">Business</option>
    </select>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="fullName" placeholder="Full Name">
    <input type="text" id="address" placeholder="Physical End-Use Address">

    <input type="text" id="companyRep" class="hidden" placeholder="Company Representative Name">

    <button id="fullBtn">Create Full Access Account</button>

    <div class="msg" id="msg"></div>
  </div>

</div>

<script type="module">
import { createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* =========================
   ELEMENTS
========================= */

const accountType = document.getElementById("accountType");
const companyRep = document.getElementById("companyRep");

const l_msg = document.getElementById("l_msg");
const msg = document.getElementById("msg");

/* =========================
   HELPERS
========================= */

function isPOBox(addr) {
  return /p\s*\.?\s*o\s*\.?\s*box/i.test(addr);
}

/* =========================
   UI TOGGLE
========================= */

accountType.addEventListener("change", () => {
  if (accountType.value === "business") {
    companyRep.classList.remove("hidden");
  } else {
    companyRep.classList.add("hidden");
  }
});

/* =========================
   LIMITED ACCOUNT
========================= */

document.getElementById("limitedBtn").addEventListener("click", async () => {
  const email = l_email.value;
  const password = l_password.value;
  const name = l_name.value;

  try {
    const userCred = await createUserWithEmailAndPassword(
      window.firebaseAuth,
      email,
      password
    );

    await setDoc(doc(window.firebaseDB, "users", userCred.user.uid), {
      email,
      fullName: name,
      accountType: "limited",
      approved: true,
      createdAt: Date.now()
    });

    l_msg.innerText = "Limited account created.";
  } catch (err) {
    l_msg.innerText = err.message;
  }
});

/* =========================
   FULL ACCOUNT
========================= */

document.getElementById("fullBtn").addEventListener("click", async () => {
  const email = email.value;
  const password = password.value;
  const fullName = fullName.value;
  const address = address.value;
  const type = accountType.value;

  if (isPOBox(address)) {
    msg.innerText = "PO Boxes are not allowed.";
    return;
  }

  try {
    const userCred = await createUserWithEmailAndPassword(
      window.firebaseAuth,
      email,
      password
    );

    await setDoc(doc(window.firebaseDB, "users", userCred.user.uid), {
      email,
      fullName,
      address,
      accountType: type,
      companyRep: type === "business" ? companyRep.value : null,
      approved: false,
      createdAt: Date.now()
    });

    msg.innerText = "Submitted for approval.";
  } catch (err) {
    msg.innerText = err.message;
  }
});
</script>

<script type="module" src="/ursusarmament/firebase.js"></script>

</body>
</html>
