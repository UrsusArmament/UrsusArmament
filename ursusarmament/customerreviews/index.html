<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews | Ursus Armament</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --black: #0a0a08;
    --dark: #111110;
    --surface: #1a1a17;
    --border: rgba(255,255,255,0.08);
    --text: #e8e4d9;
    --muted: #8a8678;
    --accent: #c8922a;
  }

  .btn-dark {
  background: var(--black);
  color: var(--accent);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.9rem 2.5rem;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  text-decoration: none;
  display: inline-block;
  transition: background 0.2s;
}

.btn-dark:hover {
  background: #1a1a17;
}

  body {
    margin: 0;
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
  }

  nav {
    padding: 1rem 3rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,8,0.9);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.12em;
    font-size: 1.5rem;
    text-decoration: none;
    color: var(--text);
  }

  .nav-logo:hover {
    color: var(--accent);
  }

  section { padding: 6rem 3rem; }

  .hero {
    padding-top: 10rem;
    padding-bottom: 6rem;
    background: linear-gradient(to bottom, rgba(10,10,8,0.4), var(--black));
  }

  .section-tag {
    font-family: 'Barlow Condensed';
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    font-size: 0.7rem;
  }

  h1, h2 {
    font-family: 'Bebas Neue';
    letter-spacing: 0.05em;
  }

  h1 { font-size: clamp(3rem, 8vw, 6rem); }
  h2 { font-size: 2rem; }

  p {
    color: var(--muted);
    max-width: 700px;
    line-height: 1.8;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-top: 2rem;
  }

  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem;
  }

  .review-source {
    font-family: 'Barlow Condensed';
    letter-spacing: 0.1em;
    color: var(--accent);
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
  }

  .review-text {
    color: var(--muted);
    line-height: 1.6;
  }

  .review-meta {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: rgba(232,228,217,0.5);
  }

  .empty {
    margin-top: 2rem;
    color: var(--muted);
    font-style: italic;
  }
</style>
</head>

<body>

<nav>
  <a href="/ursusarmament/" class="nav-logo">
    URSUS <span style="color:var(--accent)">ARMAMENT</span>
  </a>
</nav>

<section class="hero">
  <div class="section-tag">Field Feedback</div>
  <h1>USER<br><span style="color:var(--accent)">REVIEWS</span></h1>
  <p>
    Collected field feedback and user-submitted evaluations across Ursus systems and related platforms.
  </p>

  <div style="
  display:flex;
  justify-content:center;
  padding: 3rem;
  background: var(--dark);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
">
  <button class="btn-dark" onclick="openReviewModal()">
  Leave a Product Review
</button>
</div>
  
  <div id="reviewsContainer" class="reviews-grid"></div>
  <div id="emptyState" class="empty" style="display:none;">
    Currently No Reviews
  </div>
</section>

<script>
const sources = [
  "URSIX.reviewsjson",
  "CALIDUS.reviews.json",
  "ROTS.reviews.json",
  "NEXIS.reviews.json"
];

async function loadJSON(file) {
  try {
    const res = await fetch(file, { cache: "no-store" });
    if (!res.ok) return [];
    return await res.json();
  } catch (e) {
    return [];
  }
}

function normalize(data, sourceName) {
  // expects array, but tolerates single object
  if (!data) return [];
  const arr = Array.isArray(data) ? data : [data];

  return arr.map(item => ({
    source: sourceName,
    text: item.text || item.review || item.message || "No content",
    date: item.date || "",
    author: item.author || "Anonymous"
  }));
}

async function initReviews() {
  const container = document.getElementById("reviewsContainer");
  const empty = document.getElementById("emptyState");

  let allReviews = [];

  const results = await Promise.all(
    sources.map(s => loadJSON(s))
  );

  results.forEach((data, i) => {
    const name = sources[i].split(".")[0];
    allReviews = allReviews.concat(normalize(data, name));
  });

  if (allReviews.length === 0) {
    empty.style.display = "block";
    return;
  }

  allReviews.forEach(r => {
    const card = document.createElement("div");
    card.className = "review-card";

    card.innerHTML = `
      <div class="review-source">${r.source}</div>
      <div class="review-text">${r.text}</div>
      <div class="review-meta">${r.author}${r.date ? " • " + r.date : ""}</div>
    `;

    container.appendChild(card);
  });
}

initReviews();
</script>

<div id="reviewModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:99999; justify-content:center; align-items:center;">

  <div style="background: var(--dark); padding: 2rem; width: 90%; max-width: 600px; border: 1px solid var(--border); position: relative;">

    <button onclick="closeReviewModal()" style="position:absolute; top:10px; right:15px; background:none; border:none; color:white; font-size:20px; cursor:pointer;">
      ✕
    </button>

    <div id="reviewFormContainer">

      <h2 style="font-family:'Bebas Neue'; letter-spacing:0.06em; margin-bottom:1rem;">
        Leave a Review
      </h2>

      <form id="reviewForm">
        <div style="display:flex; flex-direction:column; gap:1rem;">

          <select name="product" required style="padding:0.75rem; background:var(--surface); color:var(--text); border:1px solid var(--border);">
            <option value="">Select Product</option>
            <option value="URSIX">URSIX</option>
            <option value="ROTS">R.O.T.S.</option>
            <option value="CALIDUS">CALIDUS</option>
            <option value="NEXIS">NEXIS</option>
          </select>

          <input type="hidden" name="rating" id="ratingInput" value="0">

<div style="display:flex; flex-direction:column; gap:0.5rem;">
  <div style="color:var(--muted); font-size:0.9rem;">Rating</div>

  <div id="starRating" style="display:flex; gap:0.4rem; font-size:1.8rem; cursor:pointer;">
    <span data-value="1">☆</span>
    <span data-value="2">☆</span>
    <span data-value="3">☆</span>
    <span data-value="4">☆</span>
    <span data-value="5">☆</span>
  </div>
</div>
          
          <input name="name" type="text" placeholder="Your Name" required
            style="padding:0.75rem; background:var(--surface); color:var(--text); border:1px solid var(--border);" />

          <select name="state" required style="padding:0.75rem; background:var(--surface); color:var(--text); border:1px solid var(--border);">
            <option value="">Select State</option>

            <option value="AL">Alabama</option>
            <option value="AK">Alaska</option>
            <option value="AZ">Arizona</option>
            <option value="AR">Arkansas</option>
            <option value="CA">California</option>
            <option value="CO">Colorado</option>
            <option value="CT">Connecticut</option>
            <option value="DE">Delaware</option>
            <option value="FL">Florida</option>
            <option value="GA">Georgia</option>
            <option value="HI">Hawaii</option>
            <option value="ID">Idaho</option>
            <option value="IL">Illinois</option>
            <option value="IN">Indiana</option>
            <option value="IA">Iowa</option>
            <option value="KS">Kansas</option>
            <option value="KY">Kentucky</option>
            <option value="LA">Louisiana</option>
            <option value="ME">Maine</option>
            <option value="MD">Maryland</option>
            <option value="MA">Massachusetts</option>
            <option value="MI">Michigan</option>
            <option value="MN">Minnesota</option>
            <option value="MS">Mississippi</option>
            <option value="MO">Missouri</option>
            <option value="MT">Montana</option>
            <option value="NE">Nebraska</option>
            <option value="NV">Nevada</option>
            <option value="NH">New Hampshire</option>
            <option value="NJ">New Jersey</option>
            <option value="NM">New Mexico</option>
            <option value="NY">New York</option>
            <option value="NC">North Carolina</option>
            <option value="ND">North Dakota</option>
            <option value="OH">Ohio</option>
            <option value="OK">Oklahoma</option>
            <option value="OR">Oregon</option>
            <option value="PA">Pennsylvania</option>
            <option value="RI">Rhode Island</option>
            <option value="SC">South Carolina</option>
            <option value="SD">South Dakota</option>
            <option value="TN">Tennessee</option>
            <option value="TX">Texas</option>
            <option value="UT">Utah</option>
            <option value="VT">Vermont</option>
            <option value="VA">Virginia</option>
            <option value="WA">Washington</option>
            <option value="WV">West Virginia</option>
            <option value="WI">Wisconsin</option>
            <option value="WY">Wyoming</option>
          </select>

          <input name="email" type="email" placeholder="Email (optional)"
            style="padding:0.75rem; background:var(--surface); color:var(--text); border:1px solid var(--border);" />

          <textarea name="review" rows="5" placeholder="Your Review" required
            style="padding:0.75rem; background:var(--surface); color:var(--text); border:1px solid var(--border);"></textarea>

          <button type="submit" class="btn-dark">Submit Review</button>

        </div>
      </form>

    </div>

    <div id="reviewThankYou" style="display:none; text-align:center;">
      <h2 style="font-family:'Bebas Neue'; letter-spacing:0.06em;">Thank you!</h2>
      <p style="color:var(--muted);">Your review has been submitted successfully.</p>
    </div>

  </div>
</div>
  
<script>
function openReviewModal() {
  document.getElementById('reviewModal').style.display = 'flex';
}

function closeReviewModal() {
  document.getElementById('reviewModal').style.display = 'none';
}

document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("reviewForm");
  if (!form) return;

  // ⭐ STAR RATING (must be initialized immediately)
  const stars = document.querySelectorAll("#starRating span");
  const ratingInput = document.getElementById("ratingInput");

  function updateStars(value) {
    stars.forEach(star => {
      const starValue = parseInt(star.dataset.value);
      star.textContent = starValue <= value ? "★" : "☆";
    });
  }

  stars.forEach(star => {
    star.addEventListener("click", () => {
      const value = parseInt(star.dataset.value);
      ratingInput.value = value;
      updateStars(value);
    });
  });

  // ⭐ FORM SUBMIT
  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = new FormData(form);

    try {
      await fetch("https://formspree.io/f/xgorkkwv", {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" }
      });

      const modal = document.getElementById("reviewModal");
      const thankYou = document.getElementById("reviewThankYou");

      form.style.display = "none";
      if (thankYou) thankYou.style.display = "block";

      setTimeout(() => {
        if (modal) modal.style.display = "none";

        form.style.display = "block";
        form.reset();
        if (thankYou) thankYou.style.display = "none";

        // reset stars too
        ratingInput.value = 0;
        updateStars(0);

      }, 2000);

    } catch (err) {
      console.error("Form submission failed:", err);
      alert("There was an issue submitting your review. Please try again.");
    }
  });

});
</script>
  
</body>
</html>
