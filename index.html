<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ursus Works</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111112;
      --surface: #1c1c1e;
      --surface-live: #1f1f1d;
      --border: rgba(255,255,255,0.07);
      --border-live: rgba(255,255,255,0.85);
      --border-dashed: rgba(255,255,255,0.15);
      --text-primary: #eceae3;
      --text-secondary: #8a8880;
      --text-muted: #4f4e4a;
      --accent: #e8e4d9;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    header .wordmark {
      font-size: 22px;
      letter-spacing: 0.18em;
      color: var(--text-primary);
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    header .rule {
      width: 36px;
      height: 1.5px;
      background: var(--text-primary);
      margin: 0 auto;
      opacity: 0.4;
    }

    header .tagline {
      font-size: 12px;
      letter-spacing: 0.10em;
      color: var(--text-secondary);
      margin-top: 0.75rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 820px;
    }

    /* LIVE card */
    .card-live {
      display: block;
      text-decoration: none;
      background: var(--surface-live);
      border: 1.5px solid var(--border-live);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
      cursor: pointer;
      position: relative;
    }

    .card-live:hover {
      background: #262624;
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    .card-live:active {
      transform: translateY(0);
    }

    /* PLACEHOLDER card */
    .card-placeholder {
      background: transparent;
      border: 0.5px dashed var(--border-dashed);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      opacity: 0.4;
    }

    .icon-wrap {
      width: 48px;
      height: 48px;
      margin-bottom: 1.25rem;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .icon-placeholder {
      width: 36px;
      height: 36px;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.5px dashed var(--border-dashed);
      border-radius: 8px;
      font-size: 20px;
      color: var(--text-muted);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
      letter-spacing: 0.01em;
    }

    .card-placeholder .card-title {
      color: var(--text-secondary);
      font-weight: 400;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .card-placeholder .card-desc {
      color: var(--text-muted);
    }

    /* CTA row */
    .card-cta-row {
      margin-top: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-cta-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-primary);
      font-weight: 700;
    }

    .card-cta-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--text-primary);
      color: #111112;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.15s, transform 0.15s;
      flex-shrink: 0;
    }

    .card-live:hover .card-cta-arrow {
      background: #ffffff;
      transform: translateX(2px);
    }

    /* placeholder CTA */
    .card-cta-placeholder {
      margin-top: 1.75rem;
      font-size: 11px;
      letter-spacing: 0.10em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    footer {
      text-align: center;
      margin-top: 3.5rem;
      font-size: 11px;
      letter-spacing: 0.10em;
      color: var(--text-muted);
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="wordmark">Ursus Works</div>
    <div class="rule"></div>
    <div class="tagline">Systems built for what comes next</div>
  </header>

  <main class="grid">

    <!-- Ursus Armament -->
    <a class="card-live" href="/ursusarmament">
      <div class="icon-wrap">
        <img src="UrsusArmamentLogo.jpg" alt="Ursus Armament logo" />
      </div>
      <div class="card-title">Ursus Armament</div>
      <div class="card-desc">Purpose-built tactical products and field-ready solutions.</div>
      <div class="card-cta-row">
        <span class="card-cta-label">Enter</span>
        <span class="card-cta-arrow">→</span>
      </div>
    </a>

    <!-- Placeholder 1 -->
    <div class="card-placeholder">
      <div class="icon-placeholder">+</div>
      <div class="card-title">Coming soon</div>
      <div class="card-desc">A new venture — details to follow.</div>
      <div class="card-cta-placeholder">— —</div>
    </div>

    <!-- Placeholder 2 -->
    <div class="card-placeholder">
      <div class="icon-placeholder">+</div>
      <div class="card-title">Coming soon</div>
      <div class="card-desc">A new venture — details to follow.</div>
      <div class="card-cta-placeholder">— —</div>
    </div>

  </main>

  <footer>
    <div>© 2025 Ursus Works</div>
    <div>contact@ursusworks.com</div>
  </footer>

</body>
</html>
