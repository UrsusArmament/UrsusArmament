```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ursus Works</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.10);
      --border-dashed: rgba(0,0,0,0.18);
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #999890;
      --radius: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --border: rgba(255,255,255,0.10);
        --border-dashed: rgba(255,255,255,0.18);
        --text-primary: #e8e7e1;
        --text-secondary: #a8a79e;
        --text-muted: #666560;
      }
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    header .wordmark {
      font-size: 22px;
      letter-spacing: 0.18em;
      color: var(--text-primary);
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    header .rule {
      width: 36px;
      height: 1.5px;
      background: var(--text-primary);
      margin: 0 auto;
    }

    header .tagline {
      font-size: 12px;
      letter-spacing: 0.10em;
      color: var(--text-primary);
      margin-top: 0.75rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 820px;
    }

    .card-live {
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }

    .card-live:hover {
      border-color: rgba(128,128,128,0.4);
      transform: translateY(-2px);
    }

    .card-live:active {
      transform: translateY(0);
    }

    .card-placeholder {
      background: transparent;
      border: 0.5px dashed var(--border-dashed);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      opacity: 0.55;
    }

    .icon-wrap {
      width: 48px;
      height: 48px;
      margin-bottom: 1.25rem;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .icon-placeholder {
      width: 36px;
      height: 36px;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.5px dashed var(--border-dashed);
      border-radius: 8px;
      font-size: 20px;
      color: var(--text-muted);
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
    }

    .card-placeholder .card-title {
      color: var(--text-secondary);
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .card-placeholder .card-desc {
      color: var(--text-muted);
    }

    .card-cta {
      margin-top: 1.75rem;
      font-size: 11px;
      letter-spacing: 0.10em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    footer {
      margin-top: 3.5rem;
      font-size: 11px;
      letter-spacing: 0.10em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <div class="wordmark">Ursus Works</div>
    <div class="rule"></div>
    <div class="tagline">Systems built for what comes next</div>
  </header>

  <main class="grid">

    <!-- Ursus Armament -->
    <a class="card-live" href="/ursusarmament">
      <div class="icon-wrap">
        <img src="UrsusArmamentLogo.jpg" alt="Ursus Armament logo" />
      </div>
      <div class="card-title">Ursus Armament</div>
      <div class="card-desc">Purpose-built tactical products and field-ready solutions.</div>
      <div class="card-cta">Enter →</div>
    </a>

    <!-- Placeholder 1 -->
    <div class="card-placeholder">
      <div class="icon-placeholder">+</div>
      <div class="card-title">Coming soon</div>
      <div class="card-desc">A new venture — details to follow.</div>
      <div class="card-cta">— —</div>
    </div>

    <!-- Placeholder 2 -->
    <div class="card-placeholder">
      <div class="icon-placeholder">+</div>
      <div class="card-title">Coming soon</div>
      <div class="card-desc">A new venture — details to follow.</div>
      <div class="card-cta">— —</div>
    </div>

  </main>

  <footer>© 2025 Ursus Works</footer>

</body>
</html>
