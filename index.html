```
header {
  padding: 40px;
  text-align: center;
  background: #1a1a1a;
}

header h1 {
  margin: 0;
  font-size: 2.5rem;
}

header p {
  color: #bbb;
  margin-top: 10px;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
}

.card h3 {
  margin-top: 0;
}

.price {
  color: #4ade80;
  font-weight: bold;
  margin: 10px 0;
}

button {
  background: #3b82f6;
  border: none;
  padding: 10px;
  color: white;
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

footer {
  text-align: center;
  padding: 30px;
  color: #777;
  margin-top: 40px;
}
```
